<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Din barnehagesøknad – status og neste steg</title>
<style>
  /* =========================================================
     DESIGN TOKENS – Varm & jordnær (fra designsystem v0.1)
     ========================================================= */
  :root {
    --bg: #F5EFE6;
    --surface: #FEFAF4;
    --surface-muted: #EFE6D8;
    --border: #E3D7C3;
    --border-strong: #CDBEA6;

    --text: #2D2621;
    --text-muted: #6B6055;
    --text-soft: #8C8073;

    --accent: #B85C3C;
    --accent-hover: #9E4B2E;
    --accent-soft: #F2DDD1;
    --success: #6F8A4E;
    --success-soft: #E1E8D4;
    --warning: #C9913A;
    --warning-soft: #F5E6CA;
    --info: #5A7A8C;
    --info-soft: #DDE6EC;
    --danger: #A8443A;
    --danger-soft: #F2D6D1;

    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-serif: "Source Serif Pro", "Georgia", serif;

    --fs-xs: 0.75rem;
    --fs-sm: 0.875rem;
    --fs-base: 1rem;
    --fs-md: 1.125rem;
    --fs-lg: 1.375rem;
    --fs-xl: 1.75rem;
    --fs-2xl: 2.25rem;
    --fs-3xl: 3rem;

    --lh-tight: 1.2;
    --lh-normal: 1.55;
    --lh-relaxed: 1.7;

    --s-1: 4px;  --s-2: 8px;  --s-3: 12px;
    --s-4: 16px; --s-5: 24px; --s-6: 32px;
    --s-7: 48px; --s-8: 64px;

    --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 24px; --r-full: 999px;

    --sh-sm: 0 1px 2px rgba(67, 46, 28, 0.04);
    --sh-md: 0 2px 8px rgba(67, 46, 28, 0.06), 0 1px 2px rgba(67, 46, 28, 0.04);
    --sh-lg: 0 8px 24px rgba(67, 46, 28, 0.08);

    --focus: 0 0 0 3px rgba(184, 92, 60, 0.35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: var(--fs-base);
    line-height: var(--lh-normal);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  h1, h2, h3, h4 {
    font-family: var(--font-serif);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: var(--lh-tight);
    color: var(--text);
    margin: 0 0 var(--s-3) 0;
  }
  h1 { font-size: var(--fs-3xl); letter-spacing: -0.02em; }
  h2 { font-size: var(--fs-2xl); }
  h3 { font-size: var(--fs-xl); }
  h4 { font-size: var(--fs-lg); font-family: var(--font-sans); font-weight: 600; }
  p { margin: 0 0 var(--s-4) 0; color: var(--text-muted); }
  small { color: var(--text-soft); font-size: var(--fs-sm); }

  /* Layout */
  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: var(--s-6) var(--s-5) var(--s-8);
  }
  .lead {
    font-size: var(--fs-md);
    color: var(--text-muted);
    max-width: 60ch;
    line-height: var(--lh-relaxed);
  }
  .row { display: flex; flex-wrap: wrap; gap: var(--s-3); align-items: center; }
  .stack { display: flex; flex-direction: column; gap: var(--s-3); }
  .section-label {
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-soft);
    margin-bottom: var(--s-3);
    font-weight: 600;
  }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--s-6);
    padding-bottom: var(--s-4);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand {
    display: flex; align-items: center; gap: var(--s-3);
  }
  .topbar .brand .logo {
    width: 36px; height: 36px; border-radius: var(--r-md);
    background: var(--accent);
    display: grid; place-items: center;
    color: #FFF8F2;
    font-family: var(--font-serif);
    font-weight: 600;
  }
  .topbar .brand .title {
    font-family: var(--font-serif);
    font-size: var(--fs-md);
    font-weight: 600;
  }
  .topbar .brand .sub {
    font-size: var(--fs-xs);
    color: var(--text-soft);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Knapper */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: var(--s-2);
    font-family: var(--font-sans);
    font-size: var(--fs-base); font-weight: 600;
    line-height: 1; padding: 14px 22px;
    border-radius: var(--r-md);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background-color 120ms ease, transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    text-decoration: none; min-height: 48px;
    color: var(--text);
  }
  .btn:focus-visible { outline: none; box-shadow: var(--focus); }
  .btn:active { transform: translateY(1px); }
  .btn--primary { background: var(--accent); color: #FFF8F2; box-shadow: var(--sh-sm); }
  .btn--primary:hover { background: var(--accent-hover); }
  .btn--secondary { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn--secondary:hover { background: var(--surface-muted); border-color: var(--text-muted); }
  .btn--ghost { background: transparent; color: var(--text); }
  .btn--ghost:hover { background: var(--surface-muted); }
  .btn--sm { padding: 10px 14px; font-size: var(--fs-sm); min-height: 36px; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

  .link-ext {
    display: inline-flex; align-items: center; gap: var(--s-2);
    color: var(--accent); text-decoration: none;
    font-weight: 600;
    border-bottom: 1px solid rgba(184, 92, 60, 0.3);
    padding-bottom: 2px;
    transition: border-color 120ms ease, color 120ms ease;
  }
  .link-ext:hover { color: var(--accent-hover); border-bottom-color: var(--accent-hover); }
  .icon { width: 18px; height: 18px; flex-shrink: 0; }
  .icon-sm { width: 14px; height: 14px; flex-shrink: 0; }

  /* Kort */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: var(--s-5);
    box-shadow: var(--sh-sm);
  }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: var(--r-full);
    font-size: var(--fs-xs); font-weight: 600; letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .badge--neutral { background: var(--surface-muted); color: var(--text-muted); border-color: var(--border); }
  .badge--success { background: var(--success-soft); color: #3F5A26; border-color: #C7D4B1; }
  .badge--warning { background: var(--warning-soft); color: #7A5512; border-color: #E8D1A0; }
  .badge--info    { background: var(--info-soft); color: #2E4A5C; border-color: #BDCCD5; }
  .badge--accent  { background: var(--accent-soft); color: #7C3418; border-color: #E5C3B3; }
  .badge--danger  { background: var(--danger-soft); color: #7A2A22; border-color: #E0B8B2; }
  .badge .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: currentColor; }

  /* Progress */
  .progress {
    height: 10px; background: var(--surface-muted);
    border-radius: var(--r-full); overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress .bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #D07A5A);
    border-radius: var(--r-full);
    transition: width 400ms ease;
  }

  /* Stepper */
  .stepper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: var(--s-4) var(--s-3);
    margin-bottom: var(--s-6);
    box-shadow: var(--sh-sm);
    overflow-x: auto;
  }
  .stepper-inner { display: flex; align-items: stretch; gap: var(--s-2); min-width: min-content; }
  .stage-pill {
    flex: 1 1 0; min-width: 120px;
    display: flex; flex-direction: column;
    align-items: flex-start; gap: 6px;
    padding: var(--s-3);
    border-radius: var(--r-md);
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    text-align: left;
    transition: background-color 120ms ease, border-color 120ms ease;
    font-family: inherit; color: inherit;
  }
  .stage-pill:hover { background: var(--surface-muted); }
  .stage-pill:focus-visible { outline: none; box-shadow: var(--focus); }
  .stage-pill.is-current { background: var(--accent-soft); border-color: #E5C3B3; }
  .stage-pill.is-done { background: var(--success-soft); border-color: #C7D4B1; }
  .stage-pill .pill-head {
    display: flex; align-items: center; gap: 8px;
    font-size: var(--fs-xs); font-weight: 600; color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .stage-pill .num {
    width: 22px; height: 22px; border-radius: var(--r-full);
    background: var(--surface-muted); color: var(--text-muted);
    display: grid; place-items: center;
    font-weight: 700; font-size: 11px; flex-shrink: 0;
  }
  .stage-pill.is-done .num { background: var(--success); color: #FFF8F2; }
  .stage-pill.is-current .num { background: var(--accent); color: #FFF8F2; box-shadow: 0 0 0 3px var(--accent-soft); }
  .stage-pill .pill-title { font-weight: 600; color: var(--text); font-size: var(--fs-sm); line-height: 1.3; }
  .stage-pill .pill-meta { font-size: var(--fs-xs); color: var(--text-soft); }

  /* Fokus-kort */
  .focus {
    background: linear-gradient(180deg, #FBF5EB 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: var(--s-6);
    box-shadow: var(--sh-md);
    margin-bottom: var(--s-6);
  }
  .focus-header { display: flex; gap: var(--s-5); align-items: flex-start; margin-bottom: var(--s-5); }
  .focus-emoji {
    font-size: 2.5rem; line-height: 1;
    padding: var(--s-3);
    background: var(--accent-soft);
    border-radius: var(--r-lg);
    border: 1px solid #E5C3B3;
    flex-shrink: 0;
  }
  .focus-title-area { flex: 1; min-width: 0; }
  .focus-title-area h1 { font-size: var(--fs-2xl); margin-bottom: var(--s-2); }
  .focus-title-area .focus-meta {
    display: flex; flex-wrap: wrap; gap: var(--s-3);
    color: var(--text-soft); font-size: var(--fs-sm);
    margin-bottom: var(--s-2);
  }
  .focus-progress { margin-top: var(--s-4); }
  .focus-progress small { display: block; margin-top: 6px; color: var(--text-muted); font-weight: 500; }

  .focus-body {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: var(--s-5);
    margin-top: var(--s-5);
  }
  @media (max-width: 820px) {
    .focus-body { grid-template-columns: 1fr; }
    .focus-header { flex-direction: column; gap: var(--s-3); }
    .focus-emoji { font-size: 2rem; }
  }

  /* =========================================================
     SJEKKLISTE – med prioritet (må/bør) + infoknapp
     ========================================================= */
  .checklist {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: var(--s-3);
    box-shadow: var(--sh-sm);
  }
  .checklist-group + .checklist-group { margin-top: var(--s-2); }
  .checklist-group-label {
    display: flex; align-items: center; gap: var(--s-2);
    padding: var(--s-3) var(--s-4);
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--text-soft);
  }
  .checklist-group-label.must { color: #7C3418; }
  .checklist-group-label .pill {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: var(--r-full);
    font-size: 10px;
    background: var(--surface-muted);
    border: 1px solid var(--border);
  }
  .checklist-group-label.must .pill {
    background: var(--accent); color: #FFF8F2; border-color: var(--accent);
  }
  .checklist-group-label .count { color: var(--text-soft); font-weight: 500; margin-left: auto; }

  .check-item {
    display: flex; align-items: center;
    gap: var(--s-2);
    padding: var(--s-2) var(--s-3);
    border-radius: var(--r-md);
    transition: background-color 120ms ease;
  }
  .check-item + .check-item { border-top: 1px solid var(--border); margin-top: var(--s-1); padding-top: var(--s-3); }
  .check-item:hover { background: var(--surface-muted); }

  .check-item-toggle {
    display: flex; align-items: flex-start; gap: var(--s-3);
    flex: 1; min-width: 0;
    cursor: pointer;
    padding: var(--s-2);
    border-radius: var(--r-sm);
    user-select: none;
  }
  .check-item input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 26px; height: 26px;
    border: 2px solid var(--border-strong);
    border-radius: 8px;
    background: var(--surface);
    flex-shrink: 0; cursor: pointer;
    margin-top: 2px;
    display: grid; place-items: center;
    transition: all 140ms ease;
  }
  .check-item input[type="checkbox"]:hover { border-color: var(--accent); }
  .check-item input[type="checkbox"]:focus-visible { outline: none; box-shadow: var(--focus); }
  .check-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .check-item input[type="checkbox"]:checked::after {
    content: "";
    width: 12px; height: 6px;
    border-left: 2px solid #FFF8F2;
    border-bottom: 2px solid #FFF8F2;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .check-content {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 3px;
  }
  .check-title-row {
    display: flex; align-items: center; gap: var(--s-2);
    flex-wrap: wrap;
  }
  .check-title { font-weight: 600; color: var(--text); line-height: 1.4; }
  .check-sub { color: var(--text-soft); font-size: var(--fs-sm); line-height: 1.45; }
  .check-item input[type="checkbox"]:checked ~ .check-content .check-title {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: var(--text-soft);
  }
  .check-side {
    color: var(--text-soft); font-size: var(--fs-sm);
    white-space: nowrap; flex-shrink: 0;
  }

  /* Prioritets-tagger */
  .priority-tag {
    display: inline-flex; align-items: center;
    padding: 1px 7px;
    border-radius: var(--r-full);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .priority-tag.must { background: var(--accent); color: #FFF8F2; }
  .priority-tag.should {
    background: var(--surface); color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* Info-knapp */
  .info-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 30px; height: 30px;
    border-radius: var(--r-full);
    display: grid; place-items: center;
    cursor: pointer;
    transition: all 120ms ease;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 15px;
    font-style: italic;
  }
  .info-btn:hover {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: #E5C3B3;
  }
  .info-btn:focus-visible { outline: none; box-shadow: var(--focus); }

  /* Alert */
  .alert {
    display: flex; gap: var(--s-3);
    padding: var(--s-4);
    border-radius: var(--r-md);
    border: 1px solid;
    align-items: flex-start;
  }
  .alert--info { background: var(--info-soft); border-color: #BDCCD5; color: #2E4A5C; }
  .alert--success { background: var(--success-soft); border-color: #C7D4B1; color: #3F5A26; }
  .alert--warning { background: var(--warning-soft); border-color: #E8D1A0; color: #7A5512; }
  .alert strong { display: block; margin-bottom: 2px; }

  /* Side-kort */
  .side-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: var(--s-5);
    box-shadow: var(--sh-sm);
  }
  .side-card h4 { margin-bottom: var(--s-3); display: flex; align-items: center; gap: 8px; }
  .side-card .links { display: flex; flex-direction: column; gap: var(--s-2); }
  .side-card .links a { font-size: var(--fs-sm); }

  /* Tool-kort – barnehagefinner + permisjon */
  .tool-card {
    background: var(--accent-soft);
    border: 1px solid #E5C3B3;
    border-radius: var(--r-lg);
    padding: var(--s-5);
    box-shadow: var(--sh-sm);
    position: relative;
    overflow: hidden;
  }
  .tool-card::before {
    content: ""; position: absolute; top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(184, 92, 60, 0.15), transparent 70%);
    border-radius: 50%;
  }
  .tool-card h4 {
    color: #7C3418;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: var(--s-2);
    position: relative;
  }
  .tool-card p {
    color: var(--text-muted); font-size: var(--fs-sm);
    margin-bottom: var(--s-4); position: relative;
  }
  .tool-card .tool-actions { display: flex; flex-wrap: wrap; gap: var(--s-2); position: relative; }
  .tool-card .btn { cursor: pointer; }

  /* Focus-footer */
  .focus-footer {
    display: flex; justify-content: space-between; align-items: center;
    gap: var(--s-4); margin-top: var(--s-6);
    padding-top: var(--s-5); border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .focus-footer .nav-hint { color: var(--text-muted); font-size: var(--fs-sm); }
  .focus-footer .nav-actions { display: flex; gap: var(--s-3); flex-wrap: wrap; }

  /* Outcome-grid */
  .outcome-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: var(--s-3);
    margin-bottom: var(--s-5);
  }
  .outcome-option {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--r-md);
    padding: var(--s-4);
    cursor: pointer;
    transition: all 140ms ease;
    display: flex; flex-direction: column; gap: 6px;
    text-align: left;
    font-family: inherit; color: inherit;
  }
  .outcome-option:hover { border-color: var(--border-strong); background: var(--surface-muted); }
  .outcome-option:focus-visible { outline: none; box-shadow: var(--focus); }
  .outcome-option.is-selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: var(--sh-sm);
  }
  .outcome-option .oemoji { font-size: 1.5rem; line-height: 1; }
  .outcome-option .otitle { font-weight: 600; font-size: var(--fs-sm); }
  .outcome-option .odesc { font-size: var(--fs-xs); color: var(--text-soft); line-height: 1.4; }

  .reset-area {
    text-align: center; margin-top: var(--s-6);
    padding-top: var(--s-5); border-top: 1px solid var(--border);
  }
  .reset-area small { display: block; margin-top: var(--s-2); }

  .description {
    background: var(--surface-muted);
    border-left: 3px solid var(--accent);
    padding: var(--s-3) var(--s-4);
    border-radius: var(--r-sm);
    margin-bottom: var(--s-4);
    color: var(--text-muted);
    font-size: var(--fs-sm);
    line-height: var(--lh-relaxed);
  }

  .stage-complete {
    background: var(--success-soft);
    border: 1px solid #C7D4B1;
    color: #3F5A26;
    border-radius: var(--r-md);
    padding: var(--s-3) var(--s-4);
    font-size: var(--fs-sm);
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    margin-top: var(--s-4);
  }

  /* =========================================================
     MODAL – generisk + iframe-variant
     ========================================================= */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(45, 38, 33, 0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: var(--s-4);
    backdrop-filter: blur(3px);
  }
  .modal-backdrop.is-open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    max-width: 680px; width: 100%;
    max-height: 90vh;
    overflow: hidden;
    box-shadow: var(--sh-lg);
    position: relative;
    display: flex; flex-direction: column;
    animation: modalIn 200ms ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(8px) scale(0.99); }
    to   { opacity: 1; transform: none; }
  }
  .modal-box.is-wide { max-width: 1200px; height: 90vh; }

  .modal-header {
    padding: var(--s-5) var(--s-6);

/* =========================================================
   STATE
   ========================================================= */
const STORAGE_KEY = 'barnehageopptak.v2';
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { currentStage: 1, checked: {}, outcome: null, completedStages: {} };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
let state = loadState();

/* =========================================================
   HJELPERE
   ========================================================= */
function stageById(id) { return STAGES.find(s => s.id === id); }
function stageSteps(stage) {
  if (stage.id === 4) {
    if (!state.outcome) return [];
    const outcome = stage.outcomes.find(o => o.id === state.outcome);
    return outcome ? outcome.steps : [];
  }
  return stage.steps || [];
}
function stageProgress(stage) {
  const steps = stageSteps(stage);
  if (steps.length === 0) return { done: 0, total: 0, pct: 0, mustDone: 0, mustTotal: 0 };
  const done = steps.filter(s => state.checked[s.id]).length;
  const musts = steps.filter(s => s.priority === 'must');
  const mustDone = musts.filter(s => state.checked[s.id]).length;
  return {
    done, total: steps.length,
    pct: Math.round((done / steps.length) * 100),
    mustDone, mustTotal: musts.length
  };
}
function isStageComplete(stage) {
  if (stage.id === 4 && !state.outcome) return false;
  const { done, total } = stageProgress(stage);
  return total > 0 && done === total;
}
function findStep(stepId) {
  for (const stage of STAGES) {
    if (stage.steps) {
      const s = stage.steps.find(st => st.id === stepId);
      if (s) return s;
    }
    if (stage.outcomes) {
      for (const o of stage.outcomes) {
        const s = o.steps.find(st => st.id === stepId);
        if (s) return s;
      }
    }
  }
  return null;
}

function iconExt() { return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>'; }
function iconCheck() { return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>'; }
function iconArrow() { return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>'; }
function iconBack() { return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>'; }
function iconMap() { return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2 3 5v17l6-3 6 3 6-3V2l-6 3-6-3Z"/><path d="M9 2v17"/><path d="M15 5v17"/></svg>'; }
function iconCal() { return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>'; }
function iconLink() { return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'; }
function iconCopy() { return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16V4a2 2 0 0 1 2-2h10"/></svg>'; }

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

/* =========================================================
   RENDER – stepper
   ========================================================= */
function renderStepper() {
  const el = document.getElementById('stepper-inner');
  el.innerHTML = STAGES.map(stage => {
    const progress = stageProgress(stage);
    const isCurrent = state.currentStage === stage.id;
    const isDone = isStageComplete(stage) && !isCurrent;
    const cls = ['stage-pill'];
    if (isCurrent) cls.push('is-current');
    if (isDone) cls.push('is-done');
    const numContent = isDone ? iconCheck() : stage.id;
    return `
      <button class="${cls.join(' ')}" data-stage="${stage.id}" aria-label="Gå til stadium ${stage.id}: ${stage.title}">
        <div class="pill-head"><span class="num">${numContent}</span><span>Stadium ${stage.id}</span></div>
        <div class="pill-title">${stage.emoji} ${stage.short}</div>
        <div class="pill-meta">${progress.total > 0 ? `${progress.done}/${progress.total} steg` : (stage.id === 4 ? 'Velg utfall' : '—')}</div>
      </button>
    `;
  }).join('');
  el.querySelectorAll('.stage-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      state.currentStage = parseInt(btn.dataset.stage, 10);
      saveState();
      renderAll();
      document.getElementById('focus').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

/* =========================================================
   RENDER – sjekkliste gruppert på må/bør
   ========================================================= */
function renderChecklist(steps) {
  const musts = steps.filter(s => s.priority === 'must');
  const shoulds = steps.filter(s => s.priority !== 'must');
  const groupHtml = (group, label, labelClass, groupSteps) => `
    <div class="checklist-group">
      <div class="checklist-group-label ${labelClass}">
        <span class="pill">${group}</span>
        ${label}
        <span class="count">${groupSteps.filter(s => state.checked[s.id]).length} / ${groupSteps.length}</span>
      </div>
      ${groupSteps.map(renderCheckItem).join('')}
    </div>
  `;
  let html = '<div class="checklist">';
  if (musts.length) html += groupHtml('Må', 'Uten dette blir ikke prosessen komplett', 'must', musts);
  if (shoulds.length) html += groupHtml('Bør', 'Øker sjansen for å få en bedre plass', 'should', shoulds);
  html += '</div>';
  return html;
}

function renderCheckItem(s) {
  const checked = state.checked[s.id] ? 'checked' : '';
  const tagClass = s.priority === 'must' ? 'must' : 'should';
  const tagText = s.priority === 'must' ? 'Må' : 'Bør';
  const hasDetail = !!s.detail;
  return `
    <div class="check-item">
      <label class="check-item-toggle">
        <input type="checkbox" data-step="${s.id}" ${checked} />
        <span class="check-content">
          <span class="check-title-row">
            <span class="priority-tag ${tagClass}">${tagText}</span>
            <span class="check-title">${escapeHtml(s.title)}</span>
          </span>
          <span class="check-sub">${escapeHtml(s.sub || '')}</span>
        </span>
        ${s.time ? `<span class="check-side">${escapeHtml(s.time)}</span>` : ''}
      </label>
      ${hasDetail ? `<button class="info-btn" data-info="${s.id}" aria-label="Mer info om ${escapeHtml(s.title)}" title="Mer info">i</button>` : ''}
    </div>
  `;
}

/* =========================================================
   RENDER – verktøy-kort
   ========================================================= */
function renderTools(stage) {
  if (!stage.tools || !stage.tools.length) return '';
  return stage.tools.map(t => {
    if (t === 'finder') {
      return `
        <div class="tool-card">
          <h4>${iconMap()} Barnehagefinneren</h4>
          <p>Visualiser barnehager rundt hjem, jobb og andre punkter. Finn overlappende områder og se hva som finnes i gangavstand.</p>
          <div class="tool-actions">
            <button class="btn btn--primary btn--sm" data-open-finder>
              Åpne her på siden
              ${iconArrow()}
            </button>
          </div>
        </div>
      `;
    }
    if (t === 'permisjon') {
      return `
        <div class="tool-card">
          <h4>${iconCal()} Permisjons- og ferieplanlegger</h4>
          <p>Planlegg permisjon, ferie og utbetalt 80 % lønn opp mot barnehagestart. Beregner for mor og far/partner, og tar høyde for norske ferie- og permisjonsregler samt røde dager.</p>
          <div class="tool-actions">
            <button class="btn btn--primary btn--sm" data-open-planner>
              Åpne her på siden
              ${iconArrow()}
            </button>
          </div>
        </div>
      `;
    }
    return '';
  }).join('');
}

/* =========================================================
   RENDER – fokuskort
   ========================================================= */
function renderFocus() {
  const stage = stageById(state.currentStage);
  const el = document.getElementById('focus');
  const progress = stageProgress(stage);

  const isStage4 = stage.id === 4;
  const outcome = isStage4 && state.outcome ? stage.outcomes.find(o => o.id === state.outcome) : null;
  const descBody = outcome ? outcome.body : stage.description;
  const currentEmoji = outcome ? outcome.emoji : stage.emoji;
  const currentTitle = outcome ? `Tilbud: ${outcome.title}` : stage.title;

  const outcomeToneBadge = outcome ? {
    success: '<span class="badge badge--success"><span class="dot"></span>Optimalt</span>',
    good: '<span class="badge badge--info"><span class="dot"></span>God løsning</span>',
    ok: '<span class="badge badge--warning"><span class="dot"></span>Akseptabelt</span>',
    bad: '<span class="badge badge--warning"><span class="dot"></span>Utilstrekkelig</span>',
    none: '<span class="badge badge--danger"><span class="dot"></span>Kritisk</span>'
  }[outcome.tone] : '';

  const outcomeGrid = isStage4 ? `
    <div class="outcome-grid" role="radiogroup" aria-label="Hvilket tilbud fikk du?">
      ${stage.outcomes.map(o => `
        <button class="outcome-option ${state.outcome === o.id ? 'is-selected' : ''}"
                data-outcome="${o.id}" role="radio" aria-checked="${state.outcome === o.id}">
          <span class="oemoji">${o.emoji}</span>
          <span class="otitle">${escapeHtml(o.title)}</span>
          <span class="odesc">${escapeHtml(o.desc)}</span>
        </button>
      `).join('')}
    </div>
  ` : '';

  const steps = stageSteps(stage);
  const checklistHTML = steps.length === 0 && isStage4 ? `
    <div class="alert alert--info">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <div><strong>Velg først hvilket tilbud du fikk</strong>Da får du en skreddersydd sjekkliste for din situasjon.</div>
    </div>
  ` : renderChecklist(steps);

  let tipHTML = '';
  const tip = stage.tip;
  if (tip) {
    const cls = tip.type === 'warning' ? 'alert--warning' : (tip.type === 'success' ? 'alert--success' : 'alert--info');
    const ico = tip.type === 'warning'
      ? '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>'
      : (tip.type === 'success'
        ? '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
        : '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>');
    tipHTML = `<div class="alert ${cls}" style="margin-top: var(--s-4);">${ico}<div><strong>${escapeHtml(tip.title)}</strong>${escapeHtml(tip.body)}</div></div>`;
  }

  const toolsHTML = renderTools(stage);

  const linksHTML = `
    <div class="side-card">
      <h4>${iconLink()} Nyttige lenker</h4>
      <div class="links">
        ${stage.links.map(l => `
          <a class="link-ext" href="${escapeHtml(l.url)}" target="_blank" rel="noopener">
            ${escapeHtml(l.title)}
            ${iconExt()}
          </a>
        `).join('')}
      </div>
    </div>
  `;

  const completeHTML = isStageComplete(stage)
    ? `<div class="stage-complete">${iconCheck()} Alle steg i dette stadiet er huket av</div>` : '';

  const canBack = stage.id > 1;
  const canForward = stage.id < STAGES.length;
  const allDone = isStageComplete(stage);
  const forwardLabel = allDone ? 'Gå til neste stadium' : 'Fortsett uansett';
  const navHint = allDone
    ? 'Bra jobbet – du kan gå videre.'
    : (isStage4 && !state.outcome) ? 'Velg først hvilket tilbud du fikk.'
      : progress.mustTotal > 0
        ? `${progress.done} av ${progress.total} steg huket av · ${progress.mustDone} av ${progress.mustTotal} må-steg.`
        : `${progress.done} av ${progress.total} steg huket av.`;

  el.innerHTML = `
    <div class="focus-header">
      <div class="focus-emoji">${currentEmoji}</div>
      <div class="focus-title-area">
        <div class="section-label">Stadium ${stage.id} av ${STAGES.length}</div>
        <h1>${escapeHtml(currentTitle)}</h1>
        <div class="focus-meta">
          <span>${escapeHtml(stage.meta)}</span>
          ${outcomeToneBadge}
        </div>
        <div class="focus-progress">
          <div class="progress"><div class="bar" style="width: ${progress.pct}%"></div></div>
          <small>${progress.total > 0 ? `${progress.done} av ${progress.total} steg fullført` : 'Velg først hvilket tilbud du fikk'}</small>
        </div>
      </div>
    </div>

    <div class="description">${escapeHtml(descBody)}</div>

    ${outcomeGrid}

    <div class="focus-body">
      <div>
        <h4 style="margin-bottom: var(--s-3);">Huk av når du er ferdig</h4>
        ${checklistHTML}
        ${completeHTML}
      </div>
      <div class="stack">
        ${toolsHTML}
        ${linksHTML}
        ${tipHTML}
      </div>
    </div>

    <div class="focus-footer">
      <span class="nav-hint">${navHint}</span>
      <div class="nav-actions">
        ${canBack ? `<button class="btn btn--ghost" data-nav="back">${iconBack()} Forrige stadium</button>` : ''}
        ${canForward ? `<button class="btn ${allDone ? 'btn--primary' : 'btn--secondary'}" data-nav="next">${forwardLabel} ${iconArrow()}</button>` : ''}
      </div>
    </div>
  `;

  // Bind events
  el.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.currentStage = btn.dataset.nav === 'back'
        ? Math.max(1, state.currentStage - 1)
        : Math.min(STAGES.length, state.currentStage + 1);
      saveState(); renderAll();
      document.getElementById('focus').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  el.querySelectorAll('input[type="checkbox"][data-step]').forEach(cb => {
    cb.addEventListener('change', () => {
      state.checked[cb.dataset.step] = cb.checked;
      saveState();
      renderAll();
    });
  });

  el.querySelectorAll('.outcome-option').forEach(btn => {
    btn.addEventListener('click', () => {
      state.outcome = btn.dataset.outcome;
      saveState();
      renderAll();
    });
  });

  el.querySelectorAll('[data-info]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      openStepDetail(btn.dataset.info);
    });
  });

  el.querySelectorAll('[data-open-finder]').forEach(btn => {
    btn.addEventListener('click', openFinderModal);
  });

  el.querySelectorAll('[data-open-planner]').forEach(btn => {
    btn.addEventListener('click', openPlannerModal);
  });
}

/* =========================================================
   RENDER – topbar badge + alt
   ========================================================= */
function renderTopBadge() {
  const totalDone = STAGES.filter(s => isStageComplete(s)).length;
  document.getElementById('overall-badge-text').textContent =
    `Stadium ${state.currentStage} av ${STAGES.length} · ${totalDone} fullført`;
}
function renderAll() { renderStepper(); renderFocus(); renderTopBadge(); }

/* =========================================================
   MODAL – detail (step-info)
   ========================================================= */
function openStepDetail(stepId) {
  const step = findStep(stepId);
  if (!step || !step.detail) return;
  const d = step.detail;

  const priorityTag = step.priority === 'must'
    ? '<span class="priority-tag must">Må</span>'
    : '<span class="priority-tag should">Bør</span>';

  document.getElementById('detail-priority').innerHTML = priorityTag;
  document.getElementById('detail-modal-title').textContent = step.title;

  let bodyHtml = '';
  if (step.sub) bodyHtml += `<p class="modal-sub">${escapeHtml(step.sub)}</p>`;

  if (step.time) {
    bodyHtml += `<div class="modal-meta"><span>⏱ ${escapeHtml(step.time)}</span></div>`;
  }

  if (d.why) {
    bodyHtml += `<h4>Hvorfor dette er viktig</h4><p>${escapeHtml(d.why)}</p>`;
  }
  if (d.how && d.how.length) {
    bodyHtml += `<h4>Slik gjør du det</h4><ol>${d.how.map(h => `<li>${escapeHtml(h)}</li>`).join('')}</ol>`;
  }
  if (d.template) {
    bodyHtml += `
      <h4>Forslag til tekst</h4>
      <div class="template">
        <div class="template-head">
          <span class="template-label">${escapeHtml(d.template.label)}</span>
          <button class="copy-btn" data-copy="${stepId}">${iconCopy()} Kopier</button>
        </div>
        <div class="template-body" id="template-${stepId}">${escapeHtml(d.template.body)}</div>
      </div>
    `;
  }
  if (d.tip) {
    const cls = d.tip.type === 'info' ? 'is-info' : '';
    bodyHtml += `<div class="modal-tip ${cls}"><div><strong>${escapeHtml(d.tip.title)}</strong>${escapeHtml(d.tip.body)}</div></div>`;
  }
  if (d.tool === 'finder') {
    bodyHtml += `
      <h4>Verktøy</h4>
      <button class="btn btn--primary btn--sm" data-open-finder-from-detail>
        ${iconMap()} Åpne barnehagefinneren
      </button>
    `;
  }
  if (d.tool === 'planner') {
    bodyHtml += `
      <h4>Verktøy</h4>
      <button class="btn btn--primary btn--sm" data-open-planner-from-detail>
        ${iconCal()} Åpne permisjonsplanleggeren
      </button>
    `;
  }
  if (d.links && d.links.length) {
    bodyHtml += `<h4>Relevante lenker</h4><div class="modal-links">${d.links.map(l =>
      `<a class="link-ext" href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.title)} ${iconExt()}</a>`
    ).join('')}</div>`;
  }

  const body = document.getElementById('detail-modal-body');
  body.innerHTML = bodyHtml;

  // Wire copy-btn
  body.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tplBody = document.getElementById('template-' + btn.dataset.copy);
      if (!tplBody) return;
      const text = tplBody.textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('is-copied');
        btn.innerHTML = iconCheck() + ' Kopiert';
        setTimeout(() => {
          btn.classList.remove('is-copied');
          btn.innerHTML = iconCopy() + ' Kopier';
        }, 2000);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        btn.classList.add('is-copied');
        btn.innerHTML = iconCheck() + ' Kopiert';
        setTimeout(() => {
          btn.classList.remove('is-copied');
          btn.innerHTML = iconCopy() + ' Kopier';
        }, 2000);
      });
    });
  });

  // Wire "åpne finder fra detaljmodal"
  body.querySelectorAll('[data-open-finder-from-detail]').forEach(btn => {
    btn.addEventListener('click', () => { closeModal('detail-modal'); openFinderModal(); });
  });

  // Wire "åpne planner fra detaljmodal"
  body.querySelectorAll('[data-open-planner-from-detail]').forEach(btn => {
    btn.addEventListener('click', () => { closeModal('detail-modal'); openPlannerModal(); });
  });

  openModal('detail-modal');
}

/* =========================================================
   MODAL – barnehagefinner (iframe)
   ========================================================= */
function openFinderModal() {
  const iframe = document.getElementById('finder-iframe');
  if (!iframe.src) iframe.src = 'barnehagefinner.html';
  openModal('finder-modal');
}

/* =========================================================
   MODAL – permisjonsplanlegger (iframe)
   ========================================================= */
function openPlannerModal() {
  const iframe = document.getElementById('planner-iframe');
  if (!iframe.src) iframe.src = 'permisjonsplanlegger.html';
  openModal('planner-modal');
}

/* =========================================================
   MODAL – felles open/close
   ========================================================= */
function openModal(id) {
  document.getElementById(id).classList.add('is-open');
  document.body.classList.add('modal-open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('is-open');
  if (!document.querySelector('.modal-backdrop.is-open')) {
    document.body.classList.remove('modal-open');
  }
}

// Lukk på backdrop-klikk + ESC + data-close
document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', (e) => {
    if (e.target === bd) closeModal(bd.id);
  });
});
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close));
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const open = document.querySelector('.modal-backdrop.is-open');
    if (open) closeModal(open.id);
  }
});

/* =========================================================
   INIT
   ========================================================= */
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Vil du nullstille all fremdrift? Dette fjerner alle avkrysninger og valg.')) {
    state = { currentStage: 1, checked: {}, outcome: null, completedStages: {} };
    saveState(); renderAll();
  }
});

renderAll();
</script>
